<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The XMR Mines</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1c1c1c;
      color: #ccc;
      margin: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .top-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      border-bottom: 1px solid #444;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .stat-box {
      flex: 1 1 45%;
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .stat-box div {
      flex: 1;
    }

    .stat-label {
      font-weight: bold;
    }

    .stat-value {
      text-align: right;
    }

    .green { color: #0f0; font-weight: bold; }
    .red { color: #f00; font-weight: bold; }
    .blue { color: #0af; font-weight: bold; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border: 1px solid #444;
      text-align: center;
    }

    th {
      background: #333;
      color: #fff;
    }

    tr:nth-child(even) {
      background: #2a2a2a;
    }

    .online { color: #0f0; font-weight: bold; }
    .offline { color: #f00; font-weight: bold; }

    @media (max-width: 600px) {
      .stat-box { flex: 1 1 100%; }
      table th, table td { font-size: 14px; padding: 8px; }
    }
  </style>
</head>
<body>
  <h1>The XMR Mines</h1>

  <div class="top-stats">
    <div class="stat-box">
      <div class="stat-label">Pending XMR:</div>
      <div class="stat-value blue" id="pending">0.000000</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Est. Daily:</div>
      <div class="stat-value blue" id="est_daily">0.000000</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Paid XMR:</div>
      <div class="stat-value blue" id="paid">0.000000</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Est. Monthly:</div>
      <div class="stat-value blue" id="est_monthly">0.000000</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Pool Status:</div>
      <div class="stat-value green" id="pool_status">OFFLINE</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Total Hashrate:</div>
      <div class="stat-value green" id="total_hash">0 H/s</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Miner</th>
        <th>#</th>
        <th>Hashrate</th>
        <th>Acc</th>
        <th>Rej</th>
        <th>Uptime (h)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="miners-table">
      <tr><td colspan="7">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    async function updateDashboard() {
      try {
        const res = await fetch("https://prominent-shockheaded-terrie.ngrok-free.dev/api/stats");
        const data = await res.json();

        // Update top stats
        document.getElementById("pending").textContent = data.pool.pending.toFixed(6);
        document.getElementById("paid").textContent = data.pool.paid.toFixed(6);
        document.getElementById("pool_status").textContent = data.pool.status;
        document.getElementById("total_hash").textContent = Math.round(data.total_hash).toLocaleString() + " H/s";

        // Simple estimates
        const khs = data.total_hash / 1000;
        const estDaily = khs * (0.0084 / 103.4);
        const estMonthly = estDaily * 30;
        document.getElementById("est_daily").textContent = estDaily.toFixed(6);
        document.getElementById("est_monthly").textContent = estMonthly.toFixed(6);

        // Update miner table
        const tbody = document.getElementById("miners-table");
        tbody.innerHTML = "";

        if (data.miners.length === 0) {
          tbody.innerHTML = "<tr><td colspan='7'>No miners found.</td></tr>";
        } else {
          data.miners.forEach(m => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${m.name}</td>
              <td>${m.ip.split(".").pop()}</td>
              <td>${Math.round(m.hash).toLocaleString()}</td>
              <td>${m.acc}</td>
              <td>${m.rej}</td>
              <td>${m.up.toFixed(2)}</td>
              <td class="${m.status.toLowerCase()}">${m.status}</td>
            `;
            tbody.appendChild(row);
          });
        }
      } catch (err) {
        console.error("Error fetching stats:", err);
      }
    }

    // Initial load
    updateDashboard();

    // Refresh stats every 5 seconds
    setInterval(updateDashboard, 5000);
  </script>
</body>
</html>
