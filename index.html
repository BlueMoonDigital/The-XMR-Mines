<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monero Miner Dashboard</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a1a1a; /* very dark gray */
    color: #ccc;          /* light gray text */
    margin: 20px;
  }
  h1 {
    text-align: center;
    color: #ccc;
  }
  .stats {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
    font-family: monospace;
  }
  .stat-box {
    padding: 5px 10px;
  }
  .blue { color: #5DADE2; font-weight: bold; }
  .green { color: #27AE60; font-weight: bold; }
  .red { color: #E74C3C; font-weight: bold; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    padding: 6px 12px;
    border: 1px solid #555;
    text-align: center;
  }
  th { background: #333; color: #fff; }
  tr:nth-child(even) { background: #2a2a2a; }
  .online { color: #27AE60; font-weight: bold; }
  .offline { color: #E74C3C; font-weight: bold; }
</style>
</head>
<body>
<h1>Monero Miner Dashboard</h1>

<div class="stats">
  <div>Pending XMR: <span id="pending" class="blue">0</span> | Est. Daily = <span id="est_daily" class="blue">0</span></div>
  <div>Paid XMR: <span id="paid" class="blue">0</span> | Est. Monthly = <span id="est_monthly" class="blue">0</span></div>
  <div>Pool Status: <span id="pool_status" class="green">OFFLINE</span> | Total Hashrate = <span id="total_hash" class="green">0</span> H/s</div>
</div>

<table>
  <thead>
    <tr>
      <th>Miner</th>
      <th>#</th>
      <th>Hashrate</th>
      <th>Acc</th>
      <th>Rej</th>
      <th>Uptime (h)</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="miners-table">
    <tr><td colspan="7">Loading...</td></tr>
  </tbody>
</table>

<script>
async function updateDashboard() {
  try {
    const res = await fetch("http://192.168.1.99:5000/api/stats");
    const data = await res.json();

    // Top stats
    const khs = data.total_hash / 1000;
    const est_daily = khs * (0.0084 / 103.4);
    const est_monthly = est_daily * 30;

    document.getElementById("pending").textContent = data.pool.pending.toFixed(6);
    document.getElementById("paid").textContent = data.pool.paid.toFixed(6);
    document.getElementById("pool_status").textContent = data.pool.status;
    document.getElementById("pool_status").className = data.pool.status === "ONLINE" ? "green" : "red";
    document.getElementById("total_hash").textContent = Math.round(data.total_hash);
    document.getElementById("est_daily").textContent = est_daily.toFixed(6);
    document.getElementById("est_monthly").textContent = est_monthly.toFixed(6);

    // Miner table
    const tbody = document.getElementById("miners-table");
    tbody.innerHTML = "";
    if (data.miners.length === 0) {
      tbody.innerHTML = "<tr><td colspan='7'>No miners found.</td></tr>";
    } else {
      data.miners.forEach(m => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${m.name}</td>
          <td>${m.ip.split('.').pop()}</td>
          <td>${Math.round(m.hash)}</td>
          <td>${m.acc}</td>
          <td>${m.rej}</td>
          <td>${m.up.toFixed(2)}</td>
          <td class="${m.status.toLowerCase()}">${m.status}</td>
        `;
        tbody.appendChild(row);
      });
    }

  } catch (err) {
    console.error("Error fetching stats:", err);
  }
}

// Initial load
updateDashboard();
// Refresh every 5 seconds
setInterval(updateDashboard, 5000);
</script>
</body>
</html>
